system:
  name: "SAI (Self-Adaptive Intelligence)"
  version: "1.0.0"
  log_level: ${SAI_LOG_LEVEL:-INFO}

safety:
  level: ${SAI_SAFETY_LEVEL:-UNRESTRICTED}
  base_dir: ${SAI_BASE_DIR:-/home/kali/sai/}
  allow_self_modification: ${SAI_ALLOW_SELF_MOD:-true}

brain:
  provider: ${SAI_PROVIDER:-mock}
  model: ${MODEL_NAME:-gpt-4-turbo}
  temperature: ${SAI_TEMPERATURE:-0.2}

memory:
  db_path: ${SAI_DB_PATH:-logs/sai_memory.db}

browser:
  headless: ${SAI_BROWSER_HEADLESS:-false}
  timeout: ${SAI_BROWSER_TIMEOUT:-30000}
  locale: ${SAI_BROWSER_LOCALE:-en-US}
  timezone: ${SAI_BROWSER_TIMEZONE:-UTC}

# Idle Behavior — Autonomous GitHub Presence (with Action Pipeline)
idle:
  enabled: ${SAI_IDLE_ENABLED:-true}
  min_cooldown_seconds: ${SAI_IDLE_MIN_COOLDOWN:-120}
  max_cooldown_seconds: ${SAI_IDLE_MAX_COOLDOWN:-300}
  startup_delay_seconds: ${SAI_IDLE_STARTUP_DELAY:-30}
  max_daily_actions: ${SAI_IDLE_MAX_DAILY:-0}

# Email System — Full Gmail Control
email:
  enabled: ${SAI_EMAIL_ENABLED:-true}
  report_interval_seconds: ${SAI_EMAIL_REPORT_INTERVAL:-300}
  cmd_poll_interval_seconds: ${SAI_EMAIL_CMD_POLL:-30}
  auto_start_reports: ${SAI_EMAIL_AUTO_REPORTS:-true}
  auto_start_commands: ${SAI_EMAIL_AUTO_COMMANDS:-true}

# Business Engine — Autonomous Revenue Generation
business:
  enabled: ${SAI_BUSINESS_ENABLED:-true}
  platforms: ["upwork", "freelancer"]
  max_daily_proposals: ${SAI_BIZ_MAX_PROPOSALS:-10}
  min_budget_usd: ${SAI_BIZ_MIN_BUDGET:-50}
  max_concurrent_projects: ${SAI_BIZ_MAX_PROJECTS:-3}
  auto_accept_below_usd: ${SAI_BIZ_AUTO_ACCEPT:-0}
  skill_focus: ["python", "automation", "web-scraping", "api-development", "ai-ml"]
  proposal_style: ${SAI_BIZ_PROPOSAL_STYLE:-professional}
  idle_business_weight: ${SAI_BIZ_IDLE_WEIGHT:-60}
