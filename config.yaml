system:
  name: "SAI (Self-Adaptive Intelligence)"
  version: "1.0.0"
  log_level: ${SAI_LOG_LEVEL:-INFO}

safety:
  level: ${SAI_SAFETY_LEVEL:-STRICT}
  base_dir: ${SAI_BASE_DIR:-/home/kali/sai/}
  allow_self_modification: ${SAI_ALLOW_SELF_MOD:-true}

brain:
  provider: ${SAI_PROVIDER:-mock}
  model: ${MODEL_NAME:-gpt-4-turbo}
  temperature: ${SAI_TEMPERATURE:-0.2}

memory:
  db_path: ${SAI_DB_PATH:-logs/sai_memory.db}

browser:
  headless: ${SAI_BROWSER_HEADLESS:-false}
  timeout: ${SAI_BROWSER_TIMEOUT:-30000}
  locale: ${SAI_BROWSER_LOCALE:-en-US}
  timezone: ${SAI_BROWSER_TIMEZONE:-UTC}

# Idle Behavior — Autonomous GitHub Presence
idle:
  enabled: ${SAI_IDLE_ENABLED:-true}
  min_cooldown_seconds: ${SAI_IDLE_MIN_COOLDOWN:-30}
  max_cooldown_seconds: ${SAI_IDLE_MAX_COOLDOWN:-60}
  startup_delay_seconds: ${SAI_IDLE_STARTUP_DELAY:-30}
  max_daily_actions: ${SAI_IDLE_MAX_DAILY:-0}
